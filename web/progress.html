<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конвертация — SCORM Конвертер</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f7ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: white;
            border-bottom: 1px solid #ede9fe;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .nav-logo {
            text-decoration: none;
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .nav-logo-scorm {
            font-size: 1.2em;
            font-weight: 800;
            color: #4f46e5;
            letter-spacing: -0.5px;
        }

        .nav-logo-sub {
            font-size: 1em;
            font-weight: 400;
            color: #6b7280;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .nav-link {
            font-size: 0.88em;
            color: #4b5563;
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 8px;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
        }

        .nav-link:hover { background: #f3f4f6; color: #1e1b4b; }
        .nav-link.logout { color: #6b7280; }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            padding: 48px 40px;
            border-radius: 16px;
            box-shadow: 0 2px 16px rgba(79,70,229,0.07),
                        0 1px 3px rgba(0,0,0,0.04);
            text-align: center;
            max-width: 460px;
            width: 100%;
        }

        h1 {
            font-size: 1.4em;
            font-weight: 800;
            margin-bottom: 8px;
            color: #1e1b4b;
        }

        .subtitle {
            color: #6b7280;
            font-size: 0.92em;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .progress-wrap {
            background: #ede9fe;
            border-radius: 99px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4f46e5, #818cf8);
            border-radius: 99px;
            transition: width 0.4s ease;
        }

        .progress-label {
            font-size: 0.83em;
            color: #6b7280;
            margin-bottom: 28px;
            min-height: 20px;
        }

        .steps {
            text-align: left;
            margin-bottom: 28px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 7px 0;
            font-size: 0.88em;
            color: #9ca3af;
            transition: color 0.3s;
        }

        .step.done { color: #374151; }
        .step.active { color: #4f46e5; font-weight: 600; }

        .step-icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.78em;
            flex-shrink: 0;
            transition: background 0.3s;
            font-weight: 600;
        }

        .step.done .step-icon { background: #16a34a; color: white; }
        .step.active .step-icon {
            background: #4f46e5;
            color: white;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .result-actions {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .result-actions.visible { display: flex; }

        .btn-download {
            display: block;
            width: 100%;
            background: #4f46e5;
            color: white;
            border: none;
            padding: 13px;
            border-radius: 9px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-download:hover { background: #4338ca; }

        .btn-courses {
            display: block;
            width: 100%;
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 13px;
            border-radius: 9px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-courses:hover { background: #e5e7eb; }

        .error-msg {
            color: #dc2626;
            font-size: 0.88em;
            margin-top: 16px;
            display: none;
            background: #fef2f2;
            border: 1px solid #fecaca;
            padding: 10px 14px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<nav>
    <a class="nav-logo" href="/">
        <span class="nav-logo-scorm">SCORM</span>
        <span class="nav-logo-sub">конвертер</span>
    </a>
    <div class="nav-right">
        <a class="nav-link" href="/">На главную</a>
        <a class="nav-link" href="/history">Мои курсы</a>
        <a class="nav-link logout" href="/logout">Выйти</a>
    </div>
</nav>

<div class="page">
    <div class="card">
        <h1>Конвертация документа</h1>
        <p class="subtitle">Пожалуйста, подождите — это займёт несколько секунд</p>

        <div class="progress-wrap">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">Подготовка...</div>

        <div class="steps">
            <div class="step" id="step-1">
                <div class="step-icon">1</div>
                <span>Чтение документа</span>
            </div>
            <div class="step" id="step-2">
                <div class="step-icon">2</div>
                <span>Генерация HTML</span>
            </div>
            <div class="step" id="step-3">
                <div class="step-icon">3</div>
                <span>Формирование манифеста</span>
            </div>
            <div class="step" id="step-4">
                <div class="step-icon">4</div>
                <span>Упаковка в архив</span>
            </div>
        </div>

        <div class="result-actions" id="result-actions">
            <a class="btn-download" id="btn-download" href="#">⬇ Скачать SCORM-пакет</a>
            <a class="btn-courses" href="/history">Перейти в Мои курсы →</a>
        </div>

        <div class="error-msg" id="error-msg"></div>
    </div>
</div>

<script>
    const fill = document.getElementById("progress-fill");
    const label = document.getElementById("progress-label");
    const resultActions = document.getElementById("result-actions");
    const btnDownload = document.getElementById("btn-download");
    const errorMsg = document.getElementById("error-msg");

    function setProgress(percent, text) {
        fill.style.width = percent + "%";
        label.textContent = text;
    }

    function setStep(stepNum, state) {
        const el = document.getElementById("step-" + stepNum);
        el.className = "step " + state;
        if (state === "done") {
            el.querySelector(".step-icon").textContent = "✓";
        }
    }

    async function runProgress() {
        setStep(1, "active");
        setProgress(10, "Читаем документ...");
        await delay(600);
        setStep(1, "done");

        setStep(2, "active");
        setProgress(35, "Генерируем HTML-страницу...");
        await delay(500);

        const formData = getFormData();
        const fetchPromise = sendToServer(formData);

        await delay(400);
        setStep(2, "done");

        setStep(3, "active");
        setProgress(60, "Формируем манифест...");
        await delay(500);
        setStep(3, "done");

        setStep(4, "active");
        setProgress(85, "Упаковываем архив...");

        const result = await fetchPromise;

        setStep(4, "done");
        setProgress(100, "Готово!");

        if (result.success) {
            setTimeout(function() {
                label.textContent = "Архив успешно создан";
                btnDownload.href = "/download/" + result.session_id;
                resultActions.classList.add("visible");
            }, 400);
        } else {
            errorMsg.textContent = "Ошибка: " + (result.error || "что-то пошло не так");
            errorMsg.style.display = "block";
        }
    }

    function delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    function getFormData() {
        const saved = sessionStorage.getItem("metaFormData");
        if (!saved) return new URLSearchParams();
        return new URLSearchParams(saved);
    }

    async function sendToServer(params) {
        try {
            const response = await fetch("/finalize-ajax", {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: params.toString(),
            });
            return await response.json();
        } catch (e) {
            return { success: false, error: e.message };
        }
    }

    runProgress();
</script>

</body>
</html>
