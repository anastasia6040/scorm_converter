<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SCORM Конвертер</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        h1 { margin-bottom: 8px; font-size: 1.5em; }
        p  { color: #666; margin-bottom: 24px; }
        input[type="file"] { margin-bottom: 20px; }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .error { color: red; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>SCORM Конвертер</h1>
        <p>Загрузите документ Word — получите готовый SCORM-пакет</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
            <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/convert" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".docx" required><br>
            <button type="submit">Конвертировать и скачать</button>
        </form>
    </div>
</body>
</html>
