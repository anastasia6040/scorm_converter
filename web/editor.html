<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Редактор — {{ conversion.document_title }}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f7ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        nav {
            background: white;
            border-bottom: 1px solid #ede9fe;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-back {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.88em;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .nav-back:hover {
            background: #f3f4f6;
        }

        .nav-title {
            font-size: 0.95em;
            font-weight: 700;
            color: #1e1b4b;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-status {
            font-size: 0.82em;
            color: #9ca3af;
            padding: 0 8px;
        }

        .save-status.saved {
            color: #16a34a;
        }

        .save-status.saving {
            color: #f59e0b;
        }

        .save-status.error {
            color: #dc2626;
        }

        .btn-save {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.88em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-save:hover {
            background: #4338ca;
        }

        .toolbar {
            background: white;
            border-bottom: 1px solid #ede9fe;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tool-btn {
            background: none;
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88em;
            color: #374151;
            font-family: inherit;
            transition: background 0.12s, border-color 0.12s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background: #f3f4f6;
            border-color: #e5e7eb;
        }

        .tool-btn.active {
            background: #ede9fe;
            border-color: #c4b5fd;
            color: #4f46e5;
        }

        .tool-separator {
            width: 1px;
            height: 20px;
            background: #e5e7eb;
            margin: 0 4px;
        }

        .editor-wrap {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .editor-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: white;
        }

        #editor-content {
            max-width: 860px;
            margin: 0 auto;
            min-height: 400px;
            outline: none;
            line-height: 1.7;
            color: #1e1b4b;
        }

        #editor-content:focus {
            outline: none;
        }

        #editor-content h1 {
            font-size: 1.8em;
            margin: 0.8em 0 0.4em;
            color: #1e1b4b;
        }

        #editor-content h2 {
            font-size: 1.4em;
            margin: 0.7em 0 0.3em;
            color: #1e1b4b;
        }

        #editor-content h3 {
            font-size: 1.15em;
            margin: 0.6em 0 0.3em;
            color: #1e1b4b;
        }

        #editor-content p {
            margin: 0.6em 0;
        }

        #editor-content img {
            max-width: 100%;
            border-radius: 6px;
        }

        #editor-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        #editor-content td,
        #editor-content th {
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
        }

        #editor-content ul,
        #editor-content ol {
            margin: 0.5em 0 0.5em 1.5em;
        }

        #editor-content a {
            color: #4f46e5;
        }

        .sidebar {
            width: 220px;
            background: #faf9ff;
            border-left: 1px solid #ede9fe;
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h3 {
            font-size: 0.8em;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.83em;
            color: #374151;
            cursor: pointer;
            font-family: inherit;
            text-align: left;
            margin-bottom: 6px;
            transition: background 0.12s, border-color 0.12s;
        }

        .sidebar-btn:hover {
            background: #f5f3ff;
            border-color: #c4b5fd;
            color: #4f46e5;
        }

        .hint-text {
            font-size: 0.78em;
            color: #9ca3af;
            line-height: 1.5;
        }

        #editor-content hr {
            border: none;
            border-top: 2px solid #e5e7eb;
            margin: 1.5em 0;
        }

        .section-content .code-block {
            font-family: 'Courier New', monospace;
            font-size: .88em;
            background: #f1f5f9;
            border-left: 3px solid #2563eb;
            padding: 8px 14px;
            margin: .5em 0;
            border-radius: 0 6px 6px 0;
            color: #334155;
        }

        ul.styled-list {
            list-style: none !important;
            margin: 1em 0;
            padding: 0;
        }
        .styled-list-item {
            list-style: none !important;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin: 0.9em 0;
        }
        .styled-list-num {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2563eb;
            color: #fff;
            font-size: .85rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 0.1em;
        }
        .styled-list-text {
            flex: 1;
            line-height: 1.65;
            color: #374151;
            padding-top: 0.15em;
        }
        .styled-list-text p { margin: 0; }

        ul.plain-list { list-style: disc; margin-left: 1.4em; }

        .steps-block {
            margin: 1.5em 0;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
        }
        .step-item { border-bottom: 1px solid #e2e8f0; }
        .step-item:last-child { border-bottom: none; }

        .step-header {
            width: 100%;
            background: #f8fafc;
            border: none;
            cursor: pointer;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: .95rem;
            font-weight: 700;
            color: #1e293b;
            text-align: left;
            font-family: inherit;
        }
        .step-header.active { background: #eff6ff; color: #2563eb; }

        .step-header-title { flex: 1; }

        .step-chevron {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            transition: transform .25s ease;
            color: #94a3b8;
        }
        .step-header.active .step-chevron {
            transform: rotate(180deg);
            color: #2563eb;
        }

        .step-panel {
            max-height: none;
            overflow: visible;
            background: #fff;
        }
        .step-panel-inner { padding: 4px 20px 20px; }

        .step-chevron { pointer-events: none; }
    </style>
</head>

<body>

    <nav>
        <div class="nav-left">
            <a class="nav-back" href="/history">← Мои курсы</a>
            <span class="nav-title">{{ conversion.document_title or "Без названия" }}</span>
        </div>
        <div class="nav-right">
            <span class="save-status" id="save-status"></span>
            <button class="btn-save" onclick="saveContent()">Сохранить</button>
        </div>
    </nav>

    <div class="toolbar">
        <button class="tool-btn" onclick="format('bold')" title="Жирный"><strong>Ж</strong></button>
        <button class="tool-btn" onclick="format('italic')" title="Курсив"><em>К</em></button>
        <button class="tool-btn" onclick="format('underline')" title="Подчёркивание"><u>П</u></button>
        <button class="tool-btn" onclick="format('strikeThrough')" title="Зачёркнутый"><s>З</s></button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="formatBlock('h1')">H1</button>
        <button class="tool-btn" onclick="formatBlock('h2')">H2</button>
        <button class="tool-btn" onclick="formatBlock('h3')">H3</button>
        <button class="tool-btn" onclick="formatBlock('p')">Текст</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('insertUnorderedList')">• Список</button>
        <button class="tool-btn" onclick="format('insertOrderedList')">1. Список</button>
        <button class="tool-btn" onclick="insertHR()" title="Разделитель">— Линия</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('justifyLeft')">⬅</button>
        <button class="tool-btn" onclick="format('justifyCenter')">↔</button>
        <button class="tool-btn" onclick="format('justifyRight')">➡</button>
        <button class="tool-btn" onclick="format('justifyFull')">☰</button>

        <div class="tool-separator"></div>

        <label style="font-size:0.82em;color:#6b7280;display:flex;align-items:center;gap:4px;" title="Цвет текста">
            А
            <input type="color" id="text-color" value="#000000"
                style="width:24px;height:24px;border:none;cursor:pointer;border-radius:4px;"
                onchange="formatColor(this.value)">
        </label>

        <label style="font-size:0.82em;color:#6b7280;display:flex;align-items:center;gap:4px;" title="Цвет фона">
            🖊
            <input type="color" id="bg-color" value="#ffff00"
                style="width:24px;height:24px;border:none;cursor:pointer;border-radius:4px;"
                onchange="formatBgColor(this.value)">
        </label>

        <select onchange="formatSize(this.value)"
                style="padding:4px 8px;border:1px solid #e5e7eb;border-radius:6px;font-size:0.85em;">
            <option value="">Размер</option>
            <option value="1">Мелкий</option>
            <option value="3">Обычный</option>
            <option value="5">Крупный</option>
            <option value="7">Очень крупный</option>
        </select>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="insertLink()">🔗 Ссылка</button>
        <button class="tool-btn" onclick="insertImage()" title="Вставить изображение">🖼 Картинка</button>
        <button class="tool-btn" onclick="format('removeFormat')" title="Убрать форматирование">✕ Очистить</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('undo')">↩ Отменить</button>
        <button class="tool-btn" onclick="format('redo')">↪ Повторить</button>
    </div>

    <div class="editor-wrap">

        <div class="editor-area">
            <div id="editor-content" contenteditable="true">
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Разделы</h3>
                <div id="outline"></div>
            </div>

            <div class="sidebar-section">
                <h3>Действия</h3>
                <button class="sidebar-btn" onclick="window.open('/preview/{{ conversion.id }}', '_blank')">
                    👁 Предпросмотр
                </button>
                <button class="sidebar-btn" onclick="saveContent()">
                    💾 Сохранить
                </button>
                <button class="sidebar-btn" onclick="window.location='/download-history/{{ conversion.id }}'">
                    ⬇ Скачать архив
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Подсказка</h3>
                <p class="hint-text">
                    Кликните на любой текст чтобы начать редактирование.
                    Используйте панель инструментов для форматирования.
                    Не забудьте сохранить изменения.
                </p>
            </div>
        </div>

    </div>

    <script>
        const rawHtml = {{ html_content | tojson }};
        const conversionId = {{ conversion.id }};

        function extractSections(html) {
            const sections = [];
            const regex = /<!--SECTION_START_(\d+)-->([\s\S]*?)<!--SECTION_END_\1-->/g;
                let match;
            while ((match = regex.exec(html)) !== null) {
                sections.push({
                    index: parseInt(match[1]),
                    content: match[2]
                });
            }
            return sections;
        }

        const sections = extractSections(rawHtml);
        console.log("Секций найдено:", sections.length);
        sections.forEach((s, i) => console.log("Секция", i, "длина:", s.content.length));

        let currentIndex = 0;
        let initialized = false;

        function fixImagePaths(html) {
            return html.split('src="images/').join('src="/course-image/' + conversionId + '/');
        }

        function restoreImagePaths(html) {
            return html.split('src="/course-image/' + conversionId + '/').join('src="images/');
        }

        function updateOutline() {
            const h1 = document.querySelector("#editor-content h1");
            const items = document.querySelectorAll(".outline-item");
            if (h1 && items[currentIndex]) {
                items[currentIndex].textContent =
                    (currentIndex + 1) + ". " + h1.textContent;
            }
        }

        function loadSection(index) {
            if (initialized && sections[currentIndex]) {
                sections[currentIndex].content = restoreImagePaths(
                    document.getElementById("editor-content").innerHTML
                );
            }

            currentIndex = index;
            const section = sections[index];

            if (section) {
                const content = fixImagePaths(section.content);
                console.log("Загружаем раздел", index, "длина:", content.length);
                document.getElementById("editor-content").innerHTML = content;
            }

            document.querySelectorAll(".outline-item").forEach((item, i) => {
                item.style.color = i === index ? "#4f46e5" : "#6b7280";
                item.style.fontWeight = i === index ? "700" : "400";
                item.style.background = i === index ? "#ede9fe" : "transparent";
            });

            updateOutline();
            initialized = true;
        }

        function buildSectionList() {
            const outline = document.getElementById("outline");
            outline.innerHTML = "";

            sections.forEach(function (section, i) {
                const h1Match = section.content.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i);
                const title = h1Match
                    ? h1Match[1].replace(/<[^>]+>/g, "").trim()
                    : ("Раздел " + (i + 1));

                const item = document.createElement("div");
                item.className = "outline-item";
                item.style.cssText = `
                    font-size: 0.82em;
                    padding: 7px 10px;
                    border-radius: 7px;
                    color: #6b7280;
                    cursor: pointer;
                    margin-bottom: 3px;
                    transition: background 0.12s, color 0.12s;
                    line-height: 1.4;
                `;
                item.textContent = (i + 1) + ". " + title;
                item.onclick = function () { loadSection(i); };
                outline.appendChild(item);
            });
        }

        async function saveContent() {
            if (sections[currentIndex]) {
                sections[currentIndex].content = restoreImagePaths(
                    document.getElementById("editor-content").innerHTML
                );
            }

            const status = document.getElementById("save-status");
            status.textContent = "Сохраняем...";
            status.className = "save-status saving";

            let updatedHtml = rawHtml;
            sections.forEach(function (section) {
                const escapedContent = section.content.replace(/\$/g, '$$$$');
                const marker = '<!--SECTION_START_' + section.index + '-->[\\s\\S]*?<!--SECTION_END_' + section.index + '-->';
                updatedHtml = updatedHtml.replace(
                    new RegExp(marker),
                    '<!--SECTION_START_' + section.index + '-->' + escapedContent + '<!--SECTION_END_' + section.index + '-->'
                );
            });

            try {
                const response = await fetch("/edit/" + conversionId + "/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: updatedHtml }),
                });

                const result = await response.json();

                if (result.success) {
                    status.textContent = "Сохранено ✓";
                    status.className = "save-status saved";
                    setTimeout(() => {
                        status.textContent = "";
                        status.className = "save-status";
                    }, 3000);
                } else {
                    status.textContent = "Ошибка: " + (result.error || "неизвестная");
                    status.className = "save-status error";
                }
            } catch (e) {
                status.textContent = "Ошибка сохранения";
                status.className = "save-status error";
            }
        }

        function format(cmd) {
            document.execCommand(cmd, false, null);
            document.getElementById("editor-content").focus();
        }

        function formatBlock(tag) {
            document.execCommand("formatBlock", false, tag);
            document.getElementById("editor-content").focus();
        }

        function formatColor(color) {
            document.execCommand("foreColor", false, color);
            document.getElementById("editor-content").focus();
        }

        function formatSize(size) {
            if (size) document.execCommand("fontSize", false, size);
            document.getElementById("editor-content").focus();
        }

        function insertLink() {
            const url = prompt("Введите URL:");
            if (url) {
                document.execCommand("createLink", false, url);
                document.querySelectorAll("#editor-content a").forEach(a => {
                    a.target = "_blank";
                });
            }
        }

        function insertImage() {
            const url = prompt("Введите URL изображения:");
            if (url) {
                document.execCommand("insertImage", false, url);
                // Находим только что вставленную картинку и задаём стиль
                const imgs = document.querySelectorAll("#editor-content img");
                if (imgs.length > 0) {
                    const last = imgs[imgs.length - 1];
                    last.style.maxWidth = "100%";
                    last.style.borderRadius = "6px";
                    last.style.margin = "1em 0";
                    last.style.display = "block";
                }
                document.getElementById("editor-content").focus();
            }
        }

        function formatBgColor(color) {
            document.execCommand("hiliteColor", false, color);
            document.getElementById("editor-content").focus();
        }

        function insertHR() {
            document.execCommand("insertHorizontalRule", false, null);
            document.getElementById("editor-content").focus();
        }

        buildSectionList();
        setTimeout(() => {
            if (sections.length > 0) {
                loadSection(0);
            } else {
                const mainMatch = rawHtml.match(/<main[^>]*>([\s\S]*?)<\/main>/i);
                if (mainMatch) {
                    document.getElementById("editor-content").innerHTML =
                        fixImagePaths(mainMatch[1]);
                }
            }
        }, 0);

        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                e.preventDefault();
                saveContent();
            }
        });

        document.getElementById("editor-content").addEventListener("input", function () {
            updateOutline();
        });
    </script>

</body>

</html>
