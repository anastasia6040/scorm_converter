<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Редактор — {{ conversion.document_title }}</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f8f7ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Шапка */
        nav {
            background: white;
            border-bottom: 1px solid #ede9fe;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-back {
            color: #6b7280;
            text-decoration: none;
            font-size: 0.88em;
            padding: 6px 10px;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .nav-back:hover {
            background: #f3f4f6;
        }

        .nav-title {
            font-size: 0.95em;
            font-weight: 700;
            color: #1e1b4b;
            max-width: 300px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .save-status {
            font-size: 0.82em;
            color: #9ca3af;
            padding: 0 8px;
        }

        .save-status.saved {
            color: #16a34a;
        }

        .save-status.saving {
            color: #f59e0b;
        }

        .save-status.error {
            color: #dc2626;
        }

        .btn-save {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 0.88em;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }

        .btn-save:hover {
            background: #4338ca;
        }

        /* Панель инструментов */
        .toolbar {
            background: white;
            border-bottom: 1px solid #ede9fe;
            padding: 8px 24px;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .tool-btn {
            background: none;
            border: 1px solid transparent;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88em;
            color: #374151;
            font-family: inherit;
            transition: background 0.12s, border-color 0.12s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .tool-btn:hover {
            background: #f3f4f6;
            border-color: #e5e7eb;
        }

        .tool-btn.active {
            background: #ede9fe;
            border-color: #c4b5fd;
            color: #4f46e5;
        }

        .tool-separator {
            width: 1px;
            height: 20px;
            background: #e5e7eb;
            margin: 0 4px;
        }

        /* Основная область */
        .editor-wrap {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Область редактирования */
        .editor-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            background: white;
        }

        #editor-content {
            max-width: 860px;
            margin: 0 auto;
            min-height: 400px;
            outline: none;
            line-height: 1.7;
            color: #1e1b4b;
        }

        #editor-content:focus {
            outline: none;
        }

        /* Стили для редактируемого контента */
        #editor-content h1 {
            font-size: 1.8em;
            margin: 0.8em 0 0.4em;
            color: #1e1b4b;
        }

        #editor-content h2 {
            font-size: 1.4em;
            margin: 0.7em 0 0.3em;
            color: #1e1b4b;
        }

        #editor-content h3 {
            font-size: 1.15em;
            margin: 0.6em 0 0.3em;
            color: #1e1b4b;
        }

        #editor-content p {
            margin: 0.6em 0;
        }

        #editor-content img {
            max-width: 100%;
            border-radius: 6px;
        }

        #editor-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 1em 0;
        }

        #editor-content td,
        #editor-content th {
            border: 1px solid #e5e7eb;
            padding: 8px 12px;
        }

        #editor-content ul,
        #editor-content ol {
            margin: 0.5em 0 0.5em 1.5em;
        }

        #editor-content a {
            color: #4f46e5;
        }

        /* Боковая панель */
        .sidebar {
            width: 220px;
            background: #faf9ff;
            border-left: 1px solid #ede9fe;
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar h3 {
            font-size: 0.8em;
            font-weight: 700;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-btn {
            display: block;
            width: 100%;
            padding: 8px 12px;
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.83em;
            color: #374151;
            cursor: pointer;
            font-family: inherit;
            text-align: left;
            margin-bottom: 6px;
            transition: background 0.12s, border-color 0.12s;
        }

        .sidebar-btn:hover {
            background: #f5f3ff;
            border-color: #c4b5fd;
            color: #4f46e5;
        }

        .hint-text {
            font-size: 0.78em;
            color: #9ca3af;
            line-height: 1.5;
        }
    </style>
</head>

<body>

    <!-- Шапка -->
    <nav>
        <div class="nav-left">
            <a class="nav-back" href="/history">← Мои курсы</a>
            <span class="nav-title">{{ conversion.document_title or "Без названия" }}</span>
        </div>
        <div class="nav-right">
            <span class="save-status" id="save-status"></span>
            <button class="btn-save" onclick="saveContent()">Сохранить</button>
        </div>
    </nav>

    <!-- Панель инструментов -->
    <div class="toolbar">
        <button class="tool-btn" onclick="format('bold')" title="Жирный">
            <strong>Ж</strong>
        </button>
        <button class="tool-btn" onclick="format('italic')" title="Курсив">
            <em>К</em>
        </button>
        <button class="tool-btn" onclick="format('underline')" title="Подчёркивание">
            <u>П</u>
        </button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="formatBlock('h1')">H1</button>
        <button class="tool-btn" onclick="formatBlock('h2')">H2</button>
        <button class="tool-btn" onclick="formatBlock('h3')">H3</button>
        <button class="tool-btn" onclick="formatBlock('p')">Текст</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('insertUnorderedList')">• Список</button>
        <button class="tool-btn" onclick="format('insertOrderedList')">1. Список</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('justifyLeft')">⬅</button>
        <button class="tool-btn" onclick="format('justifyCenter')">↔</button>
        <button class="tool-btn" onclick="format('justifyRight')">➡</button>
        <button class="tool-btn" onclick="format('justifyFull')">☰</button>

        <div class="tool-separator"></div>

        <div class="tool-separator"></div>
        <label style="font-size:0.82em;color:#6b7280;display:flex;align-items:center;gap:4px;">
            🎨
            <input type="color" id="text-color" value="#000000"
                style="width:28px;height:28px;border:none;cursor:pointer;border-radius:4px;"
                onchange="formatColor(this.value)">
        </label>

        <select onchange="formatSize(this.value)"
            style="padding:4px 8px;border:1px solid #e5e7eb;border-radius:6px;font-size:0.85em;">
            <option value="">Размер</option>
            <option value="1">Мелкий</option>
            <option value="3">Обычный</option>
            <option value="5">Крупный</option>
            <option value="7">Очень крупный</option>
        </select>

        <button class="tool-btn" onclick="insertLink()">🔗 Ссылка</button>

        <div class="tool-separator"></div>

        <button class="tool-btn" onclick="format('undo')">↩ Отменить</button>
        <button class="tool-btn" onclick="format('redo')">↪ Повторить</button>
    </div>

    <!-- Основная область -->
    <div class="editor-wrap">

        <!-- Редактор -->
        <div class="editor-area">
            <div id="editor-content" contenteditable="true">
                <!-- Контент вставляется через JS -->
            </div>
        </div>

        <!-- Боковая панель -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Структура</h3>
                <div id="outline"></div>
            </div>

            <div class="sidebar-section">
                <h3>Действия</h3>
                <button class="sidebar-btn" onclick="window.open('/preview/{{ conversion.id }}', '_blank')">
                    👁 Предпросмотр
                </button>
                <button class="sidebar-btn" onclick="saveContent()">
                    💾 Сохранить
                </button>
                <button class="sidebar-btn" onclick="window.location='/download-history/{{ conversion.id }}'">
                    ⬇ Скачать архив
                </button>
            </div>

            <div class="sidebar-section">
                <h3>Подсказка</h3>
                <p class="hint-text">
                    Кликните на любой текст чтобы начать редактирование.
                    Используйте панель инструментов для форматирования.
                    Не забудьте сохранить изменения.
                </p>
            </div>
        </div>

    </div>

    <script>
        // Вставляем контент
        const rawHtml = {{ html_content | tojson }};

        // Извлекаем только содержимое <body>
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHtml, "text/html");
        const main = doc.getElementById("course") || doc.querySelector("main");
        if (main) {
            // Заменяем относительные пути к картинкам на абсолютные
            let content = main.innerHTML;
            content = content.replace(
                /src="images\//g,
                'src="/course-image/{{ conversion.id }}/'
            );
            document.getElementById("editor-content").innerHTML = content;
        } else {
            document.getElementById("editor-content").innerHTML = doc.body.innerHTML;
        }

        // Обновляем оглавление
        function updateOutline() {
            const headings = document.querySelectorAll(
                "#editor-content h1, #editor-content h2, #editor-content h3"
            );
            const outline = document.getElementById("outline");
            outline.innerHTML = "";
            headings.forEach(function (h) {
                const item = document.createElement("div");
                item.style.cssText = `
                font-size: 0.8em;
                padding: 4px 0 4px ${(parseInt(h.tagName[1]) - 1) * 10}px;
                color: #6b7280;
                cursor: pointer;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            `;
                item.textContent = h.textContent;
                item.onclick = function () { h.scrollIntoView({ behavior: "smooth" }); };
                outline.appendChild(item);
            });
        }

        updateOutline();

        // Форматирование
        function format(cmd) {
            document.execCommand(cmd, false, null);
            document.getElementById("editor-content").focus();
        }

        function formatBlock(tag) {
            document.execCommand("formatBlock", false, tag);
            document.getElementById("editor-content").focus();
        }

        function formatColor(color) {
            document.execCommand("foreColor", false, color);
            document.getElementById("editor-content").focus();
        }

        function formatSize(size) {
            if (size) document.execCommand("fontSize", false, size);
            document.getElementById("editor-content").focus();
        }

        function insertLink() {
            const url = prompt("Введите URL:");
            if (url) {
                document.execCommand("createLink", false, url);
                // Открывать в новой вкладке
                document.querySelectorAll("#editor-content a").forEach(a => {
                    a.target = "_blank";
                });
            }
        }

        // Сохранение
        async function saveContent() {
            const status = document.getElementById("save-status");
            status.textContent = "Сохраняем...";
            status.className = "save-status saving";

            const editedContent = document.getElementById("editor-content").innerHTML;

            // Вставляем отредактированный контент обратно в main оригинального HTML
            const parser = new DOMParser();
            const originalDoc = parser.parseFromString(rawHtml, "text/html");

            const main = originalDoc.getElementById("course") || originalDoc.querySelector("main");
            if (main) {
                // Возвращаем пути картинок к относительным перед сохранением
                let restoredContent = editedContent.replace(
                    /src="\/course-image\/{{ conversion.id }}\//g,
                    'src="images/'
                );
                main.innerHTML = restoredContent;
            }

            const fullHtml = originalDoc.documentElement.outerHTML;

            try {
                const response = await fetch("/edit/{{ conversion.id }}/save", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ content: fullHtml }),
                });

                const result = await response.json();

                if (result.success) {
                    status.textContent = "Сохранено ✓";
                    status.className = "save-status saved";
                    setTimeout(() => {
                        status.textContent = "";
                        status.className = "save-status";
                    }, 3000);
                } else {
                    status.textContent = "Ошибка сохранения";
                    status.className = "save-status error";
                }
            } catch (e) {
                status.textContent = "Ошибка сохранения";
                status.className = "save-status error";
            }
        }

        // Ctrl+S для сохранения
        document.addEventListener("keydown", function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                e.preventDefault();
                saveContent();
            }
        });

        // Обновляем оглавление при изменениях
        document.getElementById("editor-content").addEventListener("input", function () {
            updateOutline();
        });
    </script>

</body>

</html>
