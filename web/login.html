<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; align-items: center;
               justify-content: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: white; padding: 40px; border-radius: 12px;
                box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
        h1 { margin-bottom: 24px; font-size: 1.5em; text-align: center; }
        label { display: block; margin-bottom: 4px; font-size: 0.9em; color: #555; }
        input[type="text"], input[type="password"] {
            width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ddd;
            border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        button { width: 100%; background: #4f46e5; color: white; border: none;
                 padding: 12px; border-radius: 8px; font-size: 1em; cursor: pointer; }
        button:hover { background: #4338ca; }
        .error { color: red; margin-bottom: 12px; font-size: 0.9em; }
        .link { text-align: center; margin-top: 16px; font-size: 0.9em; }
        a { color: #4f46e5; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Вход</h1>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
            <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <label>Имя пользователя</label>
            <input type="text" name="username" required>
            <label>Пароль</label>
            <input type="password" name="password" required>
            <button type="submit">Войти</button>
        </form>
        <div class="link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
    </div>
</body>
</html>
